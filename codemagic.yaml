workflows:
  ios-workflow:
    name: WhosDown iOS Build
    max_build_duration: 120
    instance_type: mac_mini_m2

    environment:
      node: 22
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.john.whosdown

    integrations:
      app_store_connect: Who's Down

    scripts:
      - name: Install dependencies
        script: npm install

      - name: Ensure Capacitor installed
        script: |
          npm install @capacitor/core @capacitor/cli @capacitor/ios

      - name: Fix Capacitor permissions
        script: |
          chmod +x node_modules/.bin/cap || true

      - name: Setup Capacitor iOS
        script: |
          npx cap add ios || true
          npx cap sync ios

      - name: Install CocoaPods
        script: |
          cd ios/App
          pod install
          cd ../..

      - name: Build archive
        script: |
          xcodebuild \
          -workspace ios/App/App.xcworkspace \
          -scheme App \
          -configuration Release \
          -destination generic/platform=iOS \
          -archivePath build/App.xcarchive archive

      - name: Export IPA
        script: |
          xcodebuild -exportArchive \
          -archivePath build/App.xcarchive \
          -exportOptionsPlist ios/App/exportOptions.plist \
          -exportPath build

    artifacts:
      - build/**/*.ipa