workflows:
  ios-workflow:
    name: iOS Build
    environment:
      node: latest
      xcode: latest

    scripts:
      - name: Install dependencies
        script: |
          npm install

      - name: Ensure Capacitor initialized
        script: |
          chmod +x node_modules/.bin/cap
          npx cap init "WhosDown" "com.john.whosdown" --web-dir=public || true

      - name: Clean iOS
        script: |
          rm -rf ios

      - name: Add iOS platform
        script: |
          npx cap add ios

      - name: Sync Capacitor
        script: |
          npx cap sync ios

      - name: Build iOS (SIGNED)
        script: |
          cd ios/App
          xcodebuild -scheme App \
                     -configuration Release \
                     -destination generic/platform=iOS \
                     -archivePath build/App.xcarchive \
                     archive \
                     DEVELOPMENT_TEAM=V6W7YXDSH3 \
                     CODE_SIGN_STYLE=Automatic

    artifacts:
      - ios/App/build/**/*.ipa