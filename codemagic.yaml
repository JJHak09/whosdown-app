workflows:
  ios-workflow:
    name: iOS Build
    environment:
      node: latest
      xcode: latest
      cocoapods: default

    scripts:
      - name: Install dependencies
        script: |
          npm install

      - name: Capacitor sync
        script: |
          npx cap sync ios

      - name: Install CocoaPods (THIS FIXES YOUR ISSUE)
        script: |
          cd ios/App
          pod install

      - name: Build iOS
        script: |
          cd ios/App
          xcodebuild -workspace App.xcworkspace \
                     -scheme App \
                     -configuration Release \
                     -destination generic/platform=iOS \
                     archive \
                     -archivePath build/App.xcarchive

    artifacts:
      - ios/App/build/**/*.ipa

    publishing:
      app_store_connect:
        auth: integration